name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install launcher dependencies
        run: npm install --no-package-lock
        working-directory: launcher

      - name: Install calculator dependencies
        run: npm install --no-package-lock
        working-directory: apps/calculator

      - name: Install color-calculator dependencies
        run: npm install --no-package-lock
        working-directory: apps/color-calculator

      - name: Install temp-converter dependencies
        run: npm install --no-package-lock
        working-directory: apps/temp-converter

      - name: Build all projects
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
