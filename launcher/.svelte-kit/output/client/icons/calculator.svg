<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Neumorphic shadow filters -->
    <filter id="neumorph-light" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="-4" dy="-4" result="offsetblur"/>
      <feFlood flood-color="#ffffff"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="neumorph-dark" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="4" dy="4" result="offsetblur"/>
      <feFlood flood-color="#c2c8d0"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6e9ef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8dce5;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="display-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d0d4dc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e3eb;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="button-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f3f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6e9ef;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bg-gradient)"/>

  <!-- Main calculator body -->
  <g filter="url(#neumorph-dark)">
    <rect x="30" y="30" width="140" height="140" rx="20" fill="#e6e9ef"/>
  </g>
  <g filter="url(#neumorph-light)">
    <rect x="30" y="30" width="140" height="140" rx="20" fill="none"/>
  </g>

  <!-- Display screen -->
  <g>
    <rect x="45" y="45" width="110" height="35" rx="8" fill="url(#display-gradient)"/>
    <!-- Display inset shadow -->
    <rect x="45" y="45" width="110" height="35" rx="8" fill="none" stroke="#c2c8d0" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Display numbers -->
  <text x="150" y="68" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2a2f3a" text-anchor="end">123</text>

  <!-- Calculator buttons (3x4 grid) -->
  <!-- Row 1 -->
  <circle cx="60" cy="105" r="10" fill="url(#button-gradient)" stroke="#c2c8d0" stroke-width="0.5"/>
  <circle cx="85" cy="105" r="10" fill="url(#button-gradient)" stroke="#c2c8d0" stroke-width="0.5"/>
  <circle cx="110" cy="105" r="10" fill="url(#button-gradient)" stroke="#c2c8d0" stroke-width="0.5"/>
  <circle cx="135" cy="105" r="10" fill="#5a8dee" stroke="#4a7bde" stroke-width="0.5"/>

  <!-- Row 2 -->
  <circle cx="60" cy="125" r="10" fill="url(#button-gradient)" stroke="#c2c8d0" stroke-width="0.5"/>
  <circle cx="85" cy="125" r="10" fill="url(#button-gradient)" stroke="#c2c8d0" stroke-width="0.5"/>
  <circle cx="110" cy="125" r="10" fill="url(#button-gradient)" stroke="#c2c8d0" stroke-width="0.5"/>
  <circle cx="135" cy="125" r="10" fill="#5a8dee" stroke="#4a7bde" stroke-width="0.5"/>

  <!-- Row 3 -->
  <circle cx="60" cy="145" r="10" fill="url(#button-gradient)" stroke="#c2c8d0" stroke-width="0.5"/>
  <circle cx="85" cy="145" r="10" fill="url(#button-gradient)" stroke="#c2c8d0" stroke-width="0.5"/>
  <circle cx="110" cy="145" r="10" fill="url(#button-gradient)" stroke="#c2c8d0" stroke-width="0.5"/>
  <circle cx="135" cy="145" r="10" fill="#5a8dee" stroke="#4a7bde" stroke-width="0.5"/>

  <!-- Button symbols -->
  <text x="60" y="108" font-family="Arial, sans-serif" font-size="10" fill="#2a2f3a" text-anchor="middle">7</text>
  <text x="85" y="108" font-family="Arial, sans-serif" font-size="10" fill="#2a2f3a" text-anchor="middle">8</text>
  <text x="110" y="108" font-family="Arial, sans-serif" font-size="10" fill="#2a2f3a" text-anchor="middle">9</text>
  <text x="135" y="109" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">÷</text>

  <text x="60" y="128" font-family="Arial, sans-serif" font-size="10" fill="#2a2f3a" text-anchor="middle">4</text>
  <text x="85" y="128" font-family="Arial, sans-serif" font-size="10" fill="#2a2f3a" text-anchor="middle">5</text>
  <text x="110" y="128" font-family="Arial, sans-serif" font-size="10" fill="#2a2f3a" text-anchor="middle">6</text>
  <text x="135" y="129" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">×</text>

  <text x="60" y="148" font-family="Arial, sans-serif" font-size="10" fill="#2a2f3a" text-anchor="middle">1</text>
  <text x="85" y="148" font-family="Arial, sans-serif" font-size="10" fill="#2a2f3a" text-anchor="middle">2</text>
  <text x="110" y="148" font-family="Arial, sans-serif" font-size="10" fill="#2a2f3a" text-anchor="middle">3</text>
  <text x="135" y="149" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">-</text>

  <!-- Bottom row with equals button -->
  <ellipse cx="72.5" cy="160" rx="17" ry="8" fill="url(#button-gradient)" stroke="#c2c8d0" stroke-width="0.5"/>
  <text x="72.5" y="163" font-family="Arial, sans-serif" font-size="10" fill="#2a2f3a" text-anchor="middle">0</text>
  
  <circle cx="110" cy="160" r="8" fill="url(#button-gradient)" stroke="#c2c8d0" stroke-width="0.5"/>
  <text x="110" y="163" font-family="Arial, sans-serif" font-size="10" fill="#2a2f3a" text-anchor="middle">.</text>
  
  <circle cx="135" cy="160" r="8" fill="#5a8dee" stroke="#4a7bde" stroke-width="0.5"/>
  <text x="135" y="163" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">+</text>
</svg>
