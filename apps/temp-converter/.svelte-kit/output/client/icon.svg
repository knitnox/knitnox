<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6e9ef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8dce5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="therm-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4040;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow-dark">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="4" dy="4" result="offsetblur"/>
      <feFlood flood-color="#c2c8d0"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow-light">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="-4" dy="-4" result="offsetblur"/>
      <feFlood flood-color="#ffffff"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="url(#bg-grad)" filter="url(#shadow-dark)"/>
  <rect width="200" height="200" rx="44" fill="url(#bg-grad)" filter="url(#shadow-light)"/>

  <!-- Thermometer tube body -->
  <rect x="88" y="34" width="24" height="90" rx="12" fill="#e6e9ef"
        stroke="#c2c8d0" stroke-width="2"/>

  <!-- Mercury fill inside tube -->
  <rect x="93" y="64" width="14" height="60" rx="7" fill="url(#therm-grad)"/>

  <!-- Thermometer bulb -->
  <circle cx="100" cy="146" r="22" fill="#e6e9ef" stroke="#c2c8d0" stroke-width="2"/>
  <circle cx="100" cy="146" r="15" fill="url(#therm-grad)"/>

  <!-- Tick marks -->
  <line x1="114" y1="80" x2="120" y2="80" stroke="#8a9ab0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="114" y1="95" x2="118" y2="95" stroke="#8a9ab0" stroke-width="2" stroke-linecap="round"/>
  <line x1="114" y1="110" x2="120" y2="110" stroke="#8a9ab0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="114" y1="125" x2="118" y2="125" stroke="#8a9ab0" stroke-width="2" stroke-linecap="round"/>
</svg>
