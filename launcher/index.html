<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knitnox — Your browser OS.</title>
    <meta name="description" content="Hardware control &amp; privacy-first tools — zero cloud, zero latency. Browser-native control for ESP32, Arduino &amp; Raspberry Pi plus offline-first PWA utilities." />
    <meta name="keywords" content="knitnox, web bluetooth, web serial, webusb, esp32, arduino, raspberry pi, pwa, offline apps, browser hardware control" />
    <meta name="author" content="Knitnox" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, Telegram, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://knitnox.github.io/" />
    <meta property="og:site_name" content="Knitnox" />
    <meta property="og:title" content="Knitnox — Your browser is the controller." />
    <meta property="og:description" content="Hardware control &amp; privacy-first tools — zero cloud, zero latency." />
    <meta property="og:image" content="https://knitnox.github.io/icons/og-image.png" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Knitnox — Your browser is the controller." />
    <meta name="twitter:description" content="Hardware control &amp; privacy-first tools — zero cloud, zero latency." />
    <meta name="twitter:image" content="https://knitnox.github.io/icons/og-image.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://knitnox.github.io/" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
    <script>
      // Restore path redirected from GitHub Pages 404.html
      (function () {
        var q = window.location.search;
        if (q && q.indexOf('?p=') === 0) {
          var path = decodeURIComponent(q.slice(3));
          // App paths need a hard redirect so the correct app's index.html loads
          if (/^\/apps\/[^/]/.test(path)) {
            window.location.replace(path);
          } else {
            window.history.replaceState(null, null, path + window.location.hash);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
